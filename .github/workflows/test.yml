name: test

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Peelr.xcodeproj \
            -scheme Peelr \
            -configuration Debug \
            -destination 'platform=macOS'
